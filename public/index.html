<!doctype html>
<html lang="en">

<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
 <title>TIMДА</title>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
 <style>
 * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 transition: background 0.3s, color 0.3s, transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
 }

 :root {
 --bg: #f5f5f7;
 --bg-card: rgba(255, 255, 255, 0.85);
 --text: #1d1d1f;
 --text-secondary: #86868b;
 --accent: #0071e3;
 --border: rgba(210, 210, 215, 0.7);
 --shadow: 0 12px 40px rgba(0, 0, 0, 0.04);
 --glass: saturate(180%) blur(20px);
 --brown: #6d4c41;
 }

 .dark {
 --bg: #000000;
 --bg-card: rgba(28, 28, 30, 0.8);
 --text: #f5f5f7;
 --text-secondary: #a1a1a6;
 --accent: #0a84ff;
 --border: rgba(56, 56, 58, 0.8);
 --shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
 }

 body {
 font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
 background: var(--bg);
 color: var(--text);
 display: flex;
 justify-content: center;
 align-items: center;
 height: 100vh;
 overflow: hidden;
 -webkit-font-smoothing: antialiased;
 }

 .app {
 width: 100%;
 max-width: 440px;
 height: calc(100vh - 20px);
 background: var(--bg-card);
 backdrop-filter: var(--glass);
 -webkit-backdrop-filter: var(--glass);
 border-radius: 40px;
 box-shadow: var(--shadow);
 overflow: hidden;
 display: flex;
 flex-direction: column;
 border: 1px solid var(--border);
 }

 /* Header Styling */
 .app-header {
 display: flex;
 justify-content: space-between;
 align-items: center;
 padding: 1.2rem 1.8rem;
 z-index: 10;
 }

 .logo {
 font-size: 1.7rem;
 font-weight: 700;
 letter-spacing: -0.04em;
 }

 /* Navigation */
 .tab-nav {
 display: flex;
 padding: 0.5rem 1.5rem;
 gap: 10px;
 border-bottom: 1px solid var(--border);
 }

 .tab-btn {
 background: none;
 border: none;
 color: var(--text-secondary);
 font-weight: 600;
 font-size: 0.95rem;
 cursor: pointer;
 padding: 10px 14px;
 border-radius: 12px;
 }

 .tab-btn.active {
 color: var(--accent);
 background: rgba(0, 113, 227, 0.1);
 }

 /* Content Area */
 .content-area {
 flex: 1;
 overflow-y: auto;
 padding: 1.5rem;
 }

 /* Card Pro Design */
 .card {
 background: var(--bg-card);
 border: 1px solid var(--border);
 border-radius: 22px;
 padding: 1.2rem;
 margin-bottom: 1.2rem;
 }

 .avatar {
 width: 40px; height: 40px;
 background: var(--brown);
 border-radius: 50%;
 display: flex; align-items: center; justify-content: center;
 font-weight: bold; color: white;
 }

 .post-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.4rem; }
 .post-text { font-size: 0.95rem; line-height: 1.5; color: var(--text); opacity: 0.9; margin-bottom: 1rem; }

 /* Buttons & Inputs */
 .btn {
 background: var(--text);
 color: var(--bg);
 border: none;
 padding: 12px;
 border-radius: 14px;
 font-weight: 600;
 cursor: pointer;
 width: 100%;
 }

 .btn.outline {
 background: transparent;
 border: 1.5px solid var(--border);
 color: var(--text);
 }

 .form-field input, .form-field textarea {
 width: 100%;
 padding: 12px 16px;
 border-radius: 12px;
 border: 1px solid var(--border);
 background: rgba(128,128,128,0.05);
 color: var(--text);
 outline: none;
 }

 /* Tags & Action Row */
 .tag { background: var(--accent); color: white; padding: 3px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 500; }
 .actions { display: flex; align-items: center; gap: 15px; margin-top: 10px; color: var(--text-secondary); }
 .actions i { cursor: pointer; font-size: 1.1rem; }
 .actions i.liked { color: var(--danger); }

 .follow-btn { padding: 6px 14px; border-radius: 20px; font-weight: 600; font-size: 0.8rem; cursor: pointer; border: 1px solid var(--accent); color: var(--accent); background: transparent; }
 .follow-btn.following { background: var(--accent); color: white; }

 /* Footer */
 .app-footer {
 padding: 1rem;
 text-align: center;
 font-size: 0.75rem;
 color: var(--text-secondary);
 border-top: 1px solid var(--border);
 font-weight: 500;
 }

 /* Modal Styling */
 .modal {
 display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
 backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
 z-index: 1000; justify-content: center; align-items: center;
 }
 .modal.active { display: flex; }
 .modal-content { background: var(--bg-card); padding: 2rem; border-radius: 30px; width: 90%; max-width: 380px; border: 1px solid var(--border); }
 </style>
</head>

<body>
 <div class="app" id="appRoot"></div>

 <!-- EDIT MODAL - FULLY RESTORED -->
 <div class="modal" id="editModal">
 <div class="modal-content">
 <h3 style="margin-bottom:1rem">Edit Post</h3>
 <input type="hidden" id="editId" />
 <div class="form-field" style="margin-bottom:0.8rem"><input id="editTitle" placeholder="Title" /></div>
 <div class="form-field" style="margin-bottom:0.8rem"><textarea id="editContent" rows="4" placeholder="Content"></textarea></div>
 <div class="form-field" style="margin-bottom:1rem"><input id="editTags" placeholder="Tags (comma separated)" /></div>
 <button class="btn" id="saveEditBtn" style="margin-bottom:0.5rem">Save</button>
 <button class="btn outline" id="cancelEditBtn">Cancel</button>
 <p id="editMsg" style="font-size:0.8rem; margin-top:10px;"></p>
 </div>
 </div>

 <!-- GUEST TOAST - FULLY RESTORED -->
 <div class="modal" id="guestLikeToast">
 <div class="modal-content" style="text-align:center">
 <p style="margin-bottom:1.5rem; font-weight:500"> Please log in to like posts.</p>
 <button class="btn" id="toastLoginBtn" style="margin-bottom:0.5rem">Log In</button>
 <button class="btn outline" id="toastCancelBtn">Cancel</button>
 </div>
 </div>

 <script>
 const API = ""; 
 let state = {
 token: localStorage.getItem("token"),
 user: JSON.parse(localStorage.getItem("user") || "null"),
 currentPage: "feed",
 dark: localStorage.getItem("dark") === "true",
 followingIds: new Set(),
 };

 if (state.dark) document.documentElement.classList.add("dark");

 function apiCall(url, options = {}) {
 const headers = { "Content-Type": "application/json", ...options.headers };
 if (state.token) headers["Authorization"] = `Bearer ${state.token}`;
 return fetch(API + url, { ...options, headers }).then((res) =>
 res.json().then((data) => ({ status: res.status, ok: res.ok, data })),
 );
 }

 async function loadFollowingIds() {
 if (!state.token) return;
 try {
 const { data } = await apiCall("/me/following");
 state.followingIds.clear();
 if (data?.following) data.following.forEach((u) => state.followingIds.add(u._id));
 } catch (err) {}
 }

 function showGuestLikePrompt() { document.getElementById("guestLikeToast").classList.add("active"); }
 function hideGuestLikePrompt() { document.getElementById("guestLikeToast").classList.remove("active"); }

 document.getElementById("toastLoginBtn").addEventListener("click", () => {
 hideGuestLikePrompt(); renderAuth("login", true);
 });
 document.getElementById("toastCancelBtn").addEventListener("click", hideGuestLikePrompt);

 function renderGuestExplore() {
 const root = document.getElementById("appRoot");
 root.innerHTML = `
 <div class="app-header">
 <span class="logo">TIMДА</span>
 <button class="follow-btn" id="loginLinkBtn">Login</button>
 </div>
 <div class="tab-nav"><button class="tab-btn active">Explore</button></div>
 <div class="content-area" id="contentArea"></div>
 <div class="app-footer">Built by Kuku Mubaraq Afolabbi</div>
 `;
 document.getElementById("loginLinkBtn").addEventListener("click", () => renderAuth("login", true));
 loadExplore();
 }

 function renderAuth(screen = "login", showGuestLink = false) {
 const root = document.getElementById("appRoot");
 root.innerHTML = `
 <div class="app-header"><span class="logo">TIMДА</span></div>
 <div class="content-area" style="display:flex; flex-direction:column; justify-content:center;">
 <h1 style="font-size:2rem; margin-bottom:1.5rem; text-align:center;">${screen === "login" ? "Log In" : "Sign Up"}</h1>
 <form id="authForm" style="display:flex; flex-direction:column; gap:12px;">
 ${screen === "signup" ? `
 <div class="form-field"><input id="firstName" placeholder="First Name" required></div>
 <div class="form-field"><input id="lastName" placeholder="Last Name" required></div>
 <div class="form-field"><input id="username" placeholder="Username" required></div>
 ` : ""}
 <div class="form-field"><input id="emailOrUser" placeholder="Email or Username" required></div>
 <div class="form-field"><input id="password" type="password" placeholder="Password" required></div>
 <button type="submit" class="btn">${screen === "signup" ? "Create Account" : "Sign In"}</button>
 </form>
 <p id="toggleAuth" style="text-align:center; margin-top:1.5rem; cursor:pointer; color:var(--accent); font-weight:600;">
 ${screen === "login" ? "Don't have an account? Sign up" : "Already have an account? Log in"}
 </p>
 ${showGuestLink ? `<p id="guestLink" style="text-align:center; margin-top:1rem; cursor:pointer; opacity:0.6;">Continue as Guest</p>` : ""}
 <p id="authMsg" style="text-align:center; margin-top:1rem; color:red;"></p>
 </div>
 <div class="app-footer">Built by Kuku Mubaraq Afolabbi</div>
 `;
 document.getElementById("toggleAuth").addEventListener("click", () => renderAuth(screen === "login" ? "signup" : "login", showGuestLink));
 if(showGuestLink) document.getElementById("guestLink").addEventListener("click", () => renderGuestExplore());
 
 document.getElementById("authForm").addEventListener("submit", async (e) => {
 e.preventDefault();
 const msg = document.getElementById("authMsg");
 const password = document.getElementById("password").value;
 if (screen === "signup") {
 const body = { first_name: document.getElementById("firstName").value, last_name: document.getElementById("lastName").value, username: document.getElementById("username").value, email: document.getElementById("emailOrUser").value, password };
 const { ok, data } = await apiCall("/auth/signup", { method: "POST", body: JSON.stringify(body) });
 if (ok) renderAuth("login", false); else msg.textContent = data.message;
 } else {
 const iden = document.getElementById("emailOrUser").value;
 const body = { [iden.includes("@") ? "email" : "username"]: iden, password };
 const { ok, data } = await apiCall("/auth/signin", { method: "POST", body: JSON.stringify(body) });
 if (ok) { state.token = data.token; state.user = data.user; localStorage.setItem("token", data.token); localStorage.setItem("user", JSON.stringify(data.user)); await loadFollowingIds(); renderMainApp(); }
 else msg.textContent = data.message;
 }
 });
 }

 async function renderMainApp() {
 if (state.token && state.user && state.followingIds.size === 0) await loadFollowingIds();
 const root = document.getElementById("appRoot");
 root.innerHTML = `
 <div class="app-header">
 <span class="logo">TIMДА</span>
 <button class="theme-toggle" onclick="toggleTheme()">${state.dark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>'}</button>
 </div>
 <div class="tab-nav">
 <button class="tab-btn active" data-tab="feed">Feed</button>
 <button class="tab-btn" data-tab="explore">Explore</button>
 <button class="tab-btn" data-tab="create">Post</button>
 <button class="tab-btn" data-tab="profile">Profile</button>
 </div>
 <div class="content-area" id="contentArea"></div>
 <div class="app-footer">Built by OKWOR KINGDAVID</div>
 `;
 document.querySelectorAll(".tab-btn").forEach(btn => btn.addEventListener("click", (e) => {
 document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
 btn.classList.add("active");
 loadContent(btn.dataset.tab);
 }));
 loadContent("feed");
 }

 async function loadContent(page) {
 if (page === "feed") await loadFeed();
 else if (page === "explore") await loadExplore();
 else if (page === "create") renderCreatePost();
 else if (page === "profile") await loadProfile();
 }

 async function loadFeed(pageNum = 1) {
 const { data } = await apiCall(`/feed?page=${pageNum}&limit=10`);
 let html = "";
 if (data?.posts?.length) data.posts.forEach(p => html += renderPostCard(p, false));
 else html = "<p style='text-align:center; opacity:0.6'>No posts yet. Follow people to see updates.</p>";
 document.getElementById("contentArea").innerHTML = html;
 attachPostEvents();
 }

 async function loadExplore(pageNum = 1) {
 const searchTitle = document.getElementById("searchTitle")?.value || "";
 const sort = document.getElementById("sortSelect")?.value || "timestamp";
 let url = `/posts?page=${pageNum}&limit=10&sort=${sort}`;
 if (searchTitle) url += `&title=${encodeURIComponent(searchTitle)}`;
 
 const { data } = await (state.token ? apiCall(url) : fetch(API+url).then(r => r.json().then(d => ({data: d}))));
 let html = `
 <div style="display:flex; gap:10px; margin-bottom:1.5rem;">
 <input id="searchTitle" class="form-field" style="flex:2" placeholder="Search posts..." value="${searchTitle}">
 <select id="sortSelect" class="form-field" style="flex:1"><option value="timestamp">New</option><option value="like_count">Top</option></select>
 <button class="follow-btn" id="searchBtn">Go</button>
 </div>
 <div id="exploreList"></div>
 `;
 document.getElementById("contentArea").innerHTML = html;
 const list = document.getElementById("exploreList");
 if (data?.posts?.length) data.posts.forEach(p => list.innerHTML += renderPostCard(p, false));
 document.getElementById("searchBtn").onclick = () => loadExplore(1);
 attachPostEvents();
 }

 function renderCreatePost() {
 document.getElementById("contentArea").innerHTML = `
 <h2 style="margin-bottom:1.2rem">New Post</h2>
 <div class="form-field" style="margin-bottom:1rem"><input id="newTitle" placeholder="Title"></div>
 <div class="form-field" style="margin-bottom:1rem"><textarea id="newContent" rows="6" placeholder="Write something..."></textarea></div>
 <div class="form-field" style="margin-bottom:1.5rem"><input id="newTags" placeholder="Tags (comma separated)"></div>
 <button class="btn" id="submitPost">Publish Post</button>
 `;
 document.getElementById("submitPost").onclick = async () => {
 const body = { title: document.getElementById("newTitle").value, content: document.getElementById("newContent").value, tags: document.getElementById("newTags").value.split(",") };
 await apiCall("/posts", { method: "POST", body: JSON.stringify(body) });
 loadContent("feed");
 };
 }

 async function loadProfile() {
 const { data: myPosts } = await apiCall("/me/posts?limit=5");
 const { data: following } = await apiCall("/me/following");
 document.getElementById("contentArea").innerHTML = `
 <div style="text-align:center; margin-bottom:2rem;">
 <div class="avatar" style="width:60px; height:60px; margin:0 auto 10px; font-size:1.5rem">${state.user.username[0].toUpperCase()}</div>
 <h2>${state.user.username}</h2>
 </div>
 <div style="display:flex; gap:10px; margin-bottom:1.5rem">
 <button class="btn outline" id="showFollowingBtn">Following (${following?.following?.length || 0})</button>
 <button class="btn outline" id="showFollowersBtn">Followers</button>
 </div>
 <div id="profileExtra" style="display:none; margin-bottom:1.5rem"></div>
 <h3>My Recent Posts</h3>
 <div id="myPostsList">${myPosts.posts.map(p => renderPostCard(p, true)).join("")}</div>
 `;
 document.getElementById("showFollowingBtn").onclick = () => {
 const div = document.getElementById("profileExtra");
 div.style.display = "block";
 div.innerHTML = following?.following?.map(u => `<div style="padding:10px; border-bottom:1px solid var(--border)">${u.username}</div>`).join("") || "No following";
 };
 document.getElementById("showFollowersBtn").onclick = async () => {
 const { data } = await apiCall("/me/followers");
 const div = document.getElementById("profileExtra");
 div.style.display = "block";
 div.innerHTML = data.followers.map(u => `<div style="padding:10px; border-bottom:1px solid var(--border)">${u.username}</div>`).join("") || "No followers";
 };
 attachPostEvents();
 }

 function renderPostCard(post, isOwner = false) {
 const isFollowing = state.followingIds.has(post.author?._id);
 return `
 <div class="card" data-post-id="${post._id}">
 <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem">
 <div style="display:flex; align-items:center; gap:10px">
 <div class="avatar">${(post.author?.username || "?")[0].toUpperCase()}</div>
 <div><div style="font-weight:600">${post.author?.username}</div><div style="font-size:0.7rem; color:var(--text-secondary)">${new Date(post.createdAt).toLocaleDateString()}</div></div>
 </div>
 ${!isOwner && state.token ? `<button class="follow-btn ${isFollowing ? 'following' : ''}" data-author-id="${post.author?._id}" data-action="follow-toggle">${isFollowing ? 'Unfollow' : 'Follow'}</button>` : ""}
 </div>
 <div class="post-title">${post.title}</div>
 <div class="post-text">${post.content}</div>
 <div style="display:flex; gap:5px; margin-bottom:10px">${post.tags?.map(t => `<span class="tag">${t}</span>`).join("") || ""}</div>
 <div class="actions">
 <i class="${post.likedByMe ? 'fas fa-heart liked' : 'far fa-heart'}" data-action="like"></i>
 <span style="font-weight:600; font-size:0.9rem">${post.like_count}</span>
 </div>
 ${isOwner ? `<div style="margin-top:15px; display:flex; gap:10px"><button class="follow-btn" data-action="edit" style="color:var(--text); border-color:var(--border)">Edit</button><button class="follow-btn" data-action="delete" style="color:red; border-color:red">Delete</button></div>` : ""}
 </div>`;
 }

 function attachPostEvents() {
 document.querySelectorAll('[data-action="like"]').forEach(btn => btn.onclick = async (e) => {
 if (!state.token) return showGuestLikePrompt();
 const id = e.target.closest(".card").dataset.postId;
 const method = e.target.classList.contains("liked") ? "DELETE" : "POST";
 await apiCall(`/posts/${id}/like`, { method }); loadContent(state.currentPage);
 });
 document.querySelectorAll('[data-action="follow-toggle"]').forEach(btn => btn.onclick = async (e) => {
 const id = e.target.dataset.authorId;
 const method = state.followingIds.has(id) ? "DELETE" : "POST";
 await apiCall(`/me/follow/${id}`, { method }); await loadFollowingIds(); loadContent(state.currentPage);
 });
 document.querySelectorAll('[data-action="edit"]').forEach(btn => btn.onclick = (e) => {
 const card = e.target.closest(".card");
 document.getElementById("editId").value = card.dataset.postId;
 document.getElementById("editTitle").value = card.querySelector(".post-title").textContent;
 document.getElementById("editContent").value = card.querySelector(".post-text").textContent;
 document.getElementById("editModal").classList.add("active");
 });
 document.querySelectorAll('[data-action="delete"]').forEach(btn => btn.onclick = async (e) => {
 if (confirm("Delete?")) { await apiCall(`/posts/${e.target.closest(".card").dataset.postId}`, { method: "DELETE" }); loadContent(state.currentPage); }
 });
 }

 document.getElementById("saveEditBtn").onclick = async () => {
 const id = document.getElementById("editId").value;
 const body = { title: document.getElementById("editTitle").value, content: document.getElementById("editContent").value };
 await apiCall(`/posts/${id}`, { method: "PATCH", body: JSON.stringify(body) });
 document.getElementById("editModal").classList.remove("active");
 loadContent(state.currentPage);
 };
 document.getElementById("cancelEditBtn").onclick = () => document.getElementById("editModal").classList.remove("active");

 window.toggleTheme = function () {
 state.dark = !state.dark;
 document.documentElement.classList.toggle("dark", state.dark);
 localStorage.setItem("dark", state.dark.toString());
 renderMainApp();
 };

 if (state.token) renderMainApp(); else renderGuestExplore();
 </script>
</body>

</html>
